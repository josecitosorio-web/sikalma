<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Editar Atención - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>

    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/atencion/gestion">Gestión de Atenciones</a>
                    <span>›</span>
                    <span th:text="|Editar Atención #A0${atencion.id}|"></span>
                </div>
                <h1>Editar Atención</h1>
                <p>Modifica los datos clínicos de la atención registrada</p>
            </div>
            <span class="estado estado-atendido" th:text="${atencion.estado}"></span>
        </div>

        <div class="formulario-card">

            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>

            <h2 th:text="|Datos de la Atención — ID: #A0${atencion.id} / Cita origen: #${atencion.cita.id}|"></h2>

            <form th:action="@{/atencion/actualizar}" method="post">

                <input type="hidden" name="id" th:value="${atencion.id}">
                <input type="hidden" name="citaId" th:value="${atencion.cita.id}">

                <div class="fila-form">
                    <div>
                        <label>Paciente</label>
                        <input type="text" th:value="${atencion.cita.paciente.nombres}" readonly
                            class="solo-lectura">
                    </div>
                    <div>
                        <label>Doctor</label>
                        <input type="text" th:value="${atencion.cita.doctor.nombre}" readonly
                            class="solo-lectura">
                    </div>
                </div>

                <div class="fila-form">
                    <div>
                        <label>Servicio</label>
                        <input type="text" th:value="${atencion.cita.doctor.servicio.nombre}" readonly
                            class="solo-lectura">
                    </div>
                    <div>
                        <label>Fecha de atención</label>
                        <input type="date" th:value="${atencion.cita.fecha}" readonly
                            class="solo-lectura">
                    </div>
                </div>

                <!-- Campos editables -->
                <div class="fila-form">
                    <div>
                        <label>Hora de inicio</label>
                        <input type="time" th:value="${atencion.horaInicio}" name="horaInicio" class="solo-lectura" readonly>
                    </div>
                    <div>
                        <label>Hora de fin</label>
                        <input type="time" name="horaFin" th:value="${atencion.horaFin}">
                    </div>
                </div>

                <div class="campo">
                    <label>Diagnóstico</label>
                    <input type="text" th:value="${atencion.diagnostico}" name="diagnostico">
                </div>

                <div class="campo">
                    <label>Tratamiento indicado</label>
                    <input type="text" th:value="${atencion.tratamiento}" name="tratamiento">
                </div>

                <div class="fila-form">
                    <div>
                        <label>Costo del servicio (S/)</label>
                        <input type="text" th:value="${atencion.cita.doctor.servicio.costo}" readonly
                            class="solo-lectura">
                    </div>
                    <div>
                        <label>Estado de la atención</label>
                        <select name="estado">
                            <option th:value="'En curso'" th:selected="${atencion.estado == 'En curso'}">En curso
                            </option>
                            <option th:value="'Completada'" th:selected="${atencion.estado == 'Completada'}">Completada
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-acciones">
                    <a href="/atencion/gestion" class="btn-secundario">Cancelar</a>
                    <button type="submit" class="btn-primario">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
