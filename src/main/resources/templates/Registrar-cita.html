<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Registrar Cita - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/cita/g-citas">Gestión de Citas</a>
                    <span>›</span>
                    <span>Registrar Cita</span>
                </div>
                <h1>Registrar Nueva Cita</h1>
                <p>Complete el formulario para reservar una cita médica</p>
            </div>
        </div>

        <div class="buscador-seccion">

            <h2>Datos del Paciente</h2>

            <form th:action="@{/cita/buscar}" method="get" class="buscador-form">
                <input type="text" name="numeroDocumento" placeholder="Ingrese el número de documento del paciente..."
                    class="buscador-input" required>
                <button type="submit" class="btn-primario">Buscar Paciente</button>
            </form>

            <div class="campo">
                <input type="text" th:value="${paciente != null ? paciente.nombres : ''}" class="solo-lectura" readonly>
            </div>
        </div>



        <div class="formulario-card">
            <h2>Datos de la Cita</h2>



            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>

            <form th:action="@{/cita/ver-horario}" method="get">

                <input type="hidden" name="paciente" th:value="${paciente != null ? paciente.id : 0}">

                <div class="fila-form">
                    <div>
                        <label>Servicio (Especialidad)</label>
                        <select name="servicio" id="servicioSelect">
                            <option value="0">— Seleccione un servicio —</option>
                            <option th:each="servicio : ${servicios}" th:if="${servicio.estado}"
                                th:value="${servicio.id}" th:text="${servicio.nombre}"
                                th:selected="${servicio.id == servicioid}"></option>
                        </select>
                    </div>

                </div>

                <div class="fila-form">

                    <div>
                        <label>Doctor Asignado</label>
                        <select name="doctor" id="doctorSelect">
                            <option value="0">— Seleccione un doctor —</option>
                            <option th:each="doctor : ${doctores}" th:value="${doctor.id}" th:text="${doctor.nombre}"
                                th:attr="data-servicio=${doctor.servicio != null ? doctor.servicio.id : 0}"
                                th:selected="${doctor.id == doctorid}">
                            </option>
                        </select>
                    </div>
                </div>


                <button type="submit" class="btn-primario">Ver Horario</button>

                <div class="card-horario" th:if="${horarios != null}">

                    <div class="card-horario-header">
                        <h3>Horario de Atención</h3>
                    </div>

                    <div class="card-horario-body">

                        <div class="horario-item">
                            <span class="horario-label">Días de atención:</span>
                            <ul th:each="horario : ${horarios}">

                                <li th:text="${horario}"></li>

                            </ul>
                        </div>

                        <div class="horario-item">
                            <span class="horario-label">Hora de inicio:</span>
                            <span class="horario-valor" th:text="${doctorEncontrado.horaAtencionInicio}"></span>
                        </div>

                        <div class="horario-item">
                            <span class="horario-label">Hora de fin:</span>
                            <span class="horario-valor" th:text="${doctorEncontrado.horaAtencionFin}"></span>
                        </div>

                    </div>

                </div>


            </form>


            <form th:action="@{/cita/guardar}" method="post">

                <input type="hidden" name="paciente" th:value="${paciente != null ? paciente.id : ''}">
                <input type="hidden" name="servicio" th:value="${servicioid}">
                <input type="hidden" name="doctor" th:value="${doctorid}">

                <!-- Fecha y hora -->
                <div class="fila-form">
                    <div>
                        <label>Fecha de la Cita</label>
                        <input type="date" name="fecha" required>
                    </div>
                    <div>
                        <label>Hora de la Cita</label>
                        <input type="time" name="hora" required>
                    </div>
                </div>

                <!-- Estado inicial -->
                <div class="campo">
                    <label>Estado Inicial</label>
                    <input type="estado" name="estado" value="Pendiente" class="solo-lectura" required readonly>
                    <span class="indicacion">El estado puede modificarse más adelante desde Gestión de Citas.</span>
                </div>

                <div class="form-acciones">
                    <a href="/cita/g-citas" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-primario">Registrar Cita</button>
                </div>
            </form>
        </div>
    </main>
    <script src="/js/registrar-cita.js"></script>
</body>

</html>
