<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Usuario - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>
    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <h1>Editar Usuario</h1>
                <p>Actualice la información del usuario</p>
            </div>
        </div>

        <div class="formulario-card" style="position: relative;">

            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>
            
            <form th:action="@{/usuario/editar}" method="post">
                <input type="hidden" name="idUsuario" th:value="${usuarioEditar.id}">
                <input type="hidden" name="idDoctor" th:value="${usuarioEditar.doctor != null ? usuarioEditar.doctor.id : 0}">
                <input type="hidden" name="rol" th:value="${usuario.rol}">

                <div class="campo">
                    <label>Nombre </label>
                    <input type="text" name="nombre" th:value="${usuarioEditar.doctor != null ? usuarioEditar.doctor.nombre : ''}" readonly>
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" name="correo" th:value="${usuarioEditar.correo}" readonly>
                </div>

                <div class="fila-form">
                    <div class="campo">
                        <label>Contraseña</label>
                        <input type="password" name="contrasena" th:value="${usuarioEditar.contrasena}" required>
                    </div>

                </div>
                <div class="form-acciones">
                    <a href="/usuario/gestion" class="btn-secundario">Cancelar</a>
                    <button type="submit" class="btn-primario">Actualizar Usuario</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
