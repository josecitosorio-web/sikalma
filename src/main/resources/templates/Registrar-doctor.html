<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Doctor - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>
    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <h1>Registrar Nuevo Doctor</h1>
                <p>Complete el perfil profesional del médico</p>
            </div>
        </div>

        <div class="formulario-card" style="position: relative;">

            <div th:if="${error != null}">
                <div style="display: flex; align-items: center; gap: 12px; background-color: #FFFFFF; color: #842029; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; border-left: 5px solid #dc3545; box-shadow: 0 2px 12px rgba(0,0,0,0.06); font-size: 0.95rem;">
                    <span style="color: #dc3545; font-size: 1.1rem; font-weight: bold;">⚠️</span>
                    <span style="font-weight: 500;" th:text="${error}"></span>
                </div>
            </div>
            <form th:action="@{/doctor/guardar}" method="post">
                <div class="campo">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" th:value="${doctor.nombre}" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" name="correo" th:value="${doctor.correo}" placeholder="ejemplo@sikalma.com" required>
                </div>

                <div class="fila-form">
                    <div class="campo">
                        <label>DNI</label>
                        <input type="text" name="dni" th:value="${doctor.dni}" maxlength="8" placeholder="8 dígitos" required>
                    </div>

                    <div class="campo">
                        <label>Especialidad</label>
                        <select name="servicio.id">
                        <option value="">— Seleccione un servicio —</option>
                        <option th:each="servicio : ${servicios}" th:value="${servicio.id}" th:text="${servicio.nombre}"></option>
                        </select>

                    </div>

                    
                </div>
                <div class="fila-form">
                    <div class="campo">
                        <label>Teléfono</label>
                        <input type="text" name="telefono" th:value="${doctor.telefono}" placeholder="Solo números" required>
                    </div>
                    <div class="campo">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" th:value="${doctor.fechaNacimiento}" required>
                    </div>
                </div>
                <div class="fila-form">
                    <div class="campo">
                        <label>Horario de inicio</label>
                        <input type="time" name="horaAtencionInicio" th:value="${doctor.horaAtencionInicio}" required>
                    </div>
                    <div class="campo">
                        <label>Horario de fin</label>
                        <input type="time" name="horaAtencionFin" th:value="${doctor.horaAtencionFin}" required>
                    </div>
                </div>
                <div class="form-acciones" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                    <a href="/doctor/gestion" class="btn-secundario">Cancelar</a>
                    <button type="submit" class="btn-primario" style="background-color: #007bff; border: none; padding: 10px 20px; border-radius: 6px;">Registrar Doctor</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
