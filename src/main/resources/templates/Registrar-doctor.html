<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registrar Doctor - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>
    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <h1>Registrar Nuevo Doctor</h1>
                <p>Complete el perfil profesional del médico</p>
            </div>
        </div>

        <div class="formulario-card" style="position: relative;">

            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>
            <form th:action="@{/doctor/guardar}" method="post">
                <div class="campo">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" th:value="${doctor.nombre}" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" name="correo" th:value="${doctor.correo}" placeholder="ejemplo@sikalma.com"
                        required>
                </div>

                <div class="fila-form">
                    <div class="campo">
                        <label>DNI</label>
                        <input type="text" name="dni" th:value="${doctor.dni}" maxlength="8" placeholder="8 dígitos"
                            required>
                    </div>

                    <div class="campo">
                        <label>Especialidad</label>
                        <select name="servicio.id">
                            <option value="">— Seleccione un servicio —</option>
                            <option th:each="servicio : ${servicios}" th:if="${servicio.estado}"
                                th:value="${servicio.id}" th:text="${servicio.nombre}"></option>
                        </select>

                    </div>


                </div>

                <div class="fila-form">
                    <div class="campo">
                        <label>Teléfono</label>
                        <input type="text" name="telefono" th:value="${doctor.telefono}" placeholder="Solo números"
                            required>
                    </div>
                    <div class="campo">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" th:value="${doctor.fechaNacimiento}" required>
                    </div>
                </div>

                <div class="fila-form">

                    <label>Día de atención</label>

                </div>

                <div class="fila-form">

                    <div class="checkbox-group">


                        <label>
                            <input type="checkbox" name="diasLaborales" value="MONDAY">
                            Lunes
                        </label>
                        
                        <label>
                            <input type="checkbox" name="diasLaborales" value="TUESDAY">
                            Martes
                        </label>

                        <label>
                            <input type="checkbox" name="diasLaborales" value="WEDNESDAY">
                            Miercoles
                        </label>

                        <label>
                            <input type="checkbox" name="diasLaborales" value="THURSDAY">
                            Jueves
                        </label>

                        <label>
                            <input type="checkbox" name="diasLaborales" value="FRIDAY">
                            Viernes
                        </label>

                        <label>
                            <input type="checkbox" name="diasLaborales" value="SATURDAY">
                            Sábado
                        </label>

                    </div>

                </div>

        </div>

        <div class="fila-form">
            <div class="campo">
                <label>Horario de inicio</label>
                <input type="time" name="horaAtencionInicio" th:value="${doctor.horaAtencionInicio}" required>
            </div>
            <div class="campo">
                <label>Horario de fin</label>
                <input type="time" name="horaAtencionFin" th:value="${doctor.horaAtencionFin}" required>
            </div>
        </div>
        <div class="form-acciones">
            <a href="/doctor/gestion" class="btn-cancelar">Cancelar</a>
            <button type="submit" class="btn-primario">Registrar Doctor</button>
        </div>
        </form>
        </div>
    </main>
</body>

</html>
