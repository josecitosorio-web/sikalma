<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Editar Servicio - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<main>
    <div class="encabezado">
        <div class="encabezado-texto">
            <div class="retorno">
                <a href="/servicio/gestion">Servicios</a>
                <span>›</span>
                <span th:text="|Editar Servicio #S0${servicio.id}|"></span>
            </div>
            <h1>Editar Servicio</h1>
            <p>Modifica el nombre, descripción o costo del servicio</p>
        </div>
    </div>

    <div class="formulario-card">

        <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
        </div>

        <h2 th:text="|Datos del Servicio — ID: #S0${servicio.id}|"></h2>

        <form th:action="@{/servicio/editar}" method="post">

            <input type="hidden" name="id" th:value="${servicio.id}">
            <input type="hidden" name="estado" th:value="${servicio.estado}">

            <div class="campo">
                <label>Nombre del servicio</label>
                <input type="text" th:value="${servicio.nombre}" name="nombre" required>
            </div>

            <div class="campo">
                <label>Descripción</label>
                <textarea rows="3" name="descripcion" th:text="${servicio.descripcion}" required></textarea>
            </div>

            <div class="campo">
                <label>Costo (S/)</label>
                <input type="number" th:value="${servicio.costo}" name="costo" step="0.01" min="0" required>
            </div>

            <div class="form-acciones">
                <a href="/servicio/gestion" class="btn-secundario">Cancelar</a>
                <button type="submit" class="btn-primario">Guardar Cambios</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
