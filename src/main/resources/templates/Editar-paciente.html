<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Editar Paciente - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/paciente/gestion">Pacientes</a>
                    <span>›</span>
                    <span th:text="|Editar Paciente #P0${paciente.id}|"></span>
                </div>
                <h1>Editar Paciente</h1>
                <p>Modifica los datos del paciente registrado</p>
            </div>
        </div>

        <div class="formulario-card">
            <h2 th:text="|Datos del Paciente — ID: #P0${paciente.id}|"></h2>

            <div th:if="${error != null}">
                <div
                    style="display: flex; align-items: center; gap: 12px; background-color: #FFFFFF; color: #842029; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; border-left: 5px solid #dc3545; box-shadow: 0 2px 12px rgba(0,0,0,0.06); font-size: 0.95rem;">
                    <span style="color: #dc3545; font-size: 1.1rem; font-weight: bold;">⚠️</span>
                    <span style="font-weight: 500;" th:text="${error}"></span>
                </div>
            </div>

            <form th:action="@{/paciente/editar}" method="post" >

                <input type="hidden" name="id" th:value="${paciente.id}">

                <div class="campo">
                    <label>Nombre completo</label>
                    <input type="text" th:value="${paciente.nombres}" name="nombres" required>
                </div>

                <div class="campo">
                    <label>DNI</label>
                    <input type="text" th:value="${paciente.dni}" name="dni"  maxlength="8" pattern="\d{8}" inputmode="numeric" required >
                    <span class="indicacion">Debe contener exactamente 8 dígitos.</span>
                </div>

                <div class="fila-form">
                    <div>
                        <label>Teléfono</label>
                        <input type="text" th:value="${paciente.telefono}" maxlength="9" pattern="9\d{8}" inputmode="numeric" name="telefono" required >
                    </div>

                    <div>
                        <label>Fecha de nacimiento</label>
                        <input type="date" th:value="${paciente.fechaNacimiento}" maxlength="9" name="fechaNacimiento" required >
                    </div>
                </div>

                <div class="form-acciones">
                    <a href="/paciente/gestion" class="btn-secundario">Cancelar</a>
                    <button type="submit" class="btn-primario">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
