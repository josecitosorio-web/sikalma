<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../images/logo-policlinico.png">
    <title>Registrar Atención - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/registrar-atencion.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/cita/g-citas">Gestión de Citas</a>
                    <span>›</span>
                    <a href="/atencion/gestion">Gestión de Atenciones</a>
                    <span>›</span>
                    <span>Registrar Atención</span>
                </div>
                <h1>Registrar Atención</h1>
                <p>Convierte la cita en una atención médica completando los datos clínicos</p>
            </div>
        </div>

        
        <div class="cita-origen">
            <h3 th:text="|CITA DE ORIGEN — #00${cita.id}|"></h3>
            <div class="cita-origen-datos">
                <span><strong>Paciente:</strong><span th:text="${cita.paciente.nombres}"></span></span>
                <span><strong>Servicio:</strong><span th:text="${cita.doctor.servicio.nombre}"></span></span>
                <span><strong>Doctor:</strong><span th:text="${cita.doctor.nombre}"></span></span>
                <span><strong>Fecha:</strong><span th:text="${cita.fecha}"></span></span>
                <span><strong>Hora:</strong><span th:text="${cita.hora}"></span></span>
                <span><strong>Estado de cita:</strong> <span class="badge badge-confirmado" th:text="${cita.estado}"></span></span>
            </div>
        </div>

        <div class="formulario-card">

            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>

            <h2>Datos de la Atención</h2>

            <form th:action="@{/atencion/nuevo}" method="post">
                
                <input type="hidden" name="citaId" th:value="${cita.id}">

                <div class="fila-form">
                    <div>
                        <label>Paciente</label>
                        <input type="text" th:value="${cita.paciente.nombres}" readonly class="solo-lectura">
                    </div>
                    <div>
                        <label>Doctor que atiende</label>
                        <input type="text" th:value="${cita.doctor.nombre}" readonly class="solo-lectura">
                    </div>
                </div>

                <div class="fila-form">
                    <div>
                        <label>Servicio</label>
                        <input type="text" th:value="${cita.doctor.servicio.nombre}" readonly class="solo-lectura">
                    </div>
                    <div>
                        <label>Fecha de atención</label>
                        <input type="date" name="fecha" th:value="${cita.fecha}" readonly class="solo-lectura">
                    </div>
                </div>

                <!-- Datos propios de la atención -->
                <div class="fila-form">
                    <div>
                        <label>Hora de inicio</label>
                        <input type="time" name="horaInicio" th:value="${cita.hora}" required class="solo-lectura" readonly>
                    </div>
                    <div>
                        <label>Hora de fin</label>
                        <input type="time" name="horaFin" th:value="${horafin}" required class="solo-lectura" readonly>
                    </div>
                </div>

                <div class="campo">
                    <label>Diagnóstico</label>
                    <textarea name="diagnostico" rows="3" placeholder="Describa el diagnóstico del paciente..." required></textarea>
                </div>

                <div class="campo">
                    <label>Tratamiento indicado</label>
                    <textarea name="tratamiento" rows="3" placeholder="Indique el tratamiento o medicación recetada..." required></textarea>
                </div>

                <div class="fila-form">
                    <div>
                        <label>Costo del servicio (S/)</label>
                        <input type="text" th:value="${cita.doctor.servicio.costo}" name="costo" class="solo-lectura" readonly>
                    </div>
                    <div>
                        <label>Estado de la atención</label>
                        <select name="estado">
                            <option>En curso</option>
                            <option>Completada</option>
                        </select>
                    </div>
                </div>

                <div class="form-acciones">
                    <a href="/atencion/gestion" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-primario">Registrar Atención</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
