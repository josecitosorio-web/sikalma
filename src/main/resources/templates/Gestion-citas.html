<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Gestión de Citas - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/gestion-citas.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <h1>Gestión de Citas</h1>
                <p>Administra, organiza y controla las citas médicas del policlínico</p>
            </div>
            <a th:if="${usuario.rol == 'ADMIN'}" href="/cita/r-citas" class="btn-primario">+ Nueva Cita</a>
        </div>

        <div class="estadisticas">
            <div class="estadistica">
                <img src="/images/usuarios.png" alt="pacientes">
                <div>
                    <h2 th:text="${pacientes.size()}"></h2>
                    <p>Pacientes</p>
                </div>
            </div>
            <div class="estadistica">
                <img src="/images/calendario.png" alt="citas hoy">
                <div>
                    <h2 th:text="${citasHoy.size()}"></h2>
                    <p>Citas para hoy</p>
                </div>
            </div>
            <div class="estadistica">
                <img src="/images/reloj.png" alt="pendientes">
                <div>
                    <h2 th:text="${citasPendientes}"></h2>
                    <p>Pendientes</p>
                </div>
            </div>
            <div class="estadistica">
                <img src="/images/check.png" alt="atendidos">
                <div>
                    <h2 th:text="${citasConfirmados}"></h2>
                    <p>Confirmados</p>
                </div>
            </div>
        </div>

        <div class="tabla-contenedor">
            <div class="tabla-encabezado">
                
                    <h3>Listado de Citas</h3>
                    <p th:text="|Total: ${citas.size()} registros|"></p>
                
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Paciente</th>
                        <th>Servicio</th>
                        <th>Doctor</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>

                    <tr th:each="cita : ${citas}">
                        <td th:text="|#00${cita.id}|"></td>
                        <td th:text="${cita.paciente.nombres}"></td>
                        <td th:text="${cita.doctor.servicio.nombre}"></td>
                        <td th:text="${cita.doctor.nombre}"></td>
                        <td th:text="${cita.fecha}"></td>
                        <td th:text="${cita.hora}"></td>
                        <td><span class="estado" 
                            
                            th:classappend="${cita.estado == 'Confirmado' ? 'estado-confirmado' : 
                                            cita.estado == 'Pendiente' ? 'estado-pendiente' :
                                            cita.estado == 'Cancelado' ? 'estado-cancelado' :
                                            cita.estado == 'No asistio' ? 'estado-no-asistio' :
                                            'estado-atendido' }"
                            th:text="${cita.estado}"></span></td>
                        <td class="td-acciones">
                            <a th:if="${usuario.rol == 'ADMIN' && cita.estado == 'Pendiente'}" th:href="@{/cita/editar(id=${cita.id})}" class="btn-editar">Editar</a>
                            <a th:if="${usuario.rol == 'ADMIN' && cita.estado == 'Pendiente'}" th:href="@{/cita/confirmar(id=${cita.id})}" class="btn-editar">Confirmar</a>
                            <a th:if="${usuario.rol == 'ADMIN' && cita.estado == 'Pendiente'}" th:href="@{/cita/cancelar(id=${cita.id})}" class="btn-cancelar">Cancelar</a>
                            <a th:if="${usuario.rol == 'DOCTOR' && cita.estado == 'Confirmado'}" th:href="@{/cita/atender(id=${cita.id})}" class="btn-atender">Atender</a>
                            <a th:if="${usuario.rol == 'ADMIN'}" th:href="@{/historial/g-historial(id=${cita.id})}" class="btn-verHistorial">Ver Historial</a>
                            <a th:if="${usuario.rol == 'ADMIN' && cita.estado == 'Pendiente'}" th:href="@{/cita/no-asistio(id=${cita.id})}" class="btn-noAsistio">No asistió</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
