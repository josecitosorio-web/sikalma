<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Doctor - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>
    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <h1>Editar Doctor</h1>
                <p>Actualice la información del personal médico</p>
            </div>
        </div>

        <div class="formulario-card" style="position: relative;">

            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>
            <form th:action="@{/doctor/actualizar}" method="post">
                <input type="hidden" name="id" th:value="${doctor.id}">
                <input type="hidden" name="estado" th:value="${doctor.estado}">

                <div class="campo">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" th:value="${doctor.nombre}" required>
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" name="correo" th:value="${doctor.correo}" required>
                </div>

                <div class="fila-form">
                    <div class="campo">
                        <label>DNI</label>
                        <input type="text" name="dni" th:value="${doctor.dni}" maxlength="8" required>
                    </div>
                    <div class="campo">
                        <label>Especialidad</label>
                        <select name="servicio.id">
                            <option th:each="servicio : ${servicios}" th:value="${servicio.id}"
                                th:text="${servicio.nombre}" th:selected="${servicio.id == doctor.servicio.id}">
                            </option>
                        </select>

                    </div>
                </div>
                <div class="fila-form">
                    <div class="campo">
                        <label>Teléfono</label>
                        <input type="text" name="telefono" th:value="${doctor.telefono}" required>
                    </div>
                    <div class="campo">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" th:value="${doctor.fechaNacimiento}" required>
                    </div>
                </div>
                <div class="fila-form">
                    <div class="campo">
                        <label>Horario de inicio</label>
                        <input type="time" name="horaAtencionInicio" th:value="${doctor.horaAtencionInicio}" required>
                    </div>
                    <div class="campo">
                        <label>Horario de fin</label>
                        <input type="time" name="horaAtencionFin" th:value="${doctor.horaAtencionFin}" required>
                    </div>
                </div>
                <div class="form-acciones">
                    <a href="/doctor/gestion" class="btn-secundario">Cancelar</a>
                    <button type="submit" class="btn-primario">Actualizar Doctor</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
