<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Registrar Servicio - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/servicio/gestion">Servicios</a>
                    <span>›</span>
                    <span>Registrar Servicio</span>
                </div>
                <h1>Registrar Nuevo Servicio</h1>
                <p>Complete el formulario para agregar un nuevo servicio al sistema</p>
            </div>
        </div>

        <div class="formulario-card">
            <h2>Datos del Servicio</h2>

            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>

            <form th:action="@{/servicio/registrar}" method="post">
                <div class="campo">
                    <label>Nombre del servicio</label>
                    <input type="text" placeholder="Ej: Dermatología" name="nombre" required>
                </div>

                <div class="campo">
                    <label>Descripción</label>
                    <textarea rows="3" placeholder="Ej: Diagnóstico y tratamiento de enfermedades de la piel"
                        name="descripcion" required></textarea>
                </div>

                <div class="campo">
                    <label>Costo (S/)</label>
                    <input type="number" placeholder="80" name="costo" step="0.01" min="0" required>
                </div>

                <div class="form-acciones">
                    <a href="/servicio/gestion" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-primario">Registrar Servicio</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
