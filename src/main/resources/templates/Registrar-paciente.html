<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Registrar Paciente - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/paciente/gestion">Pacientes</a>
                    <span>›</span>
                    <span>Registrar Paciente</span>
                </div>
                <h1>Registrar Nuevo Paciente</h1>
                <p>Complete el formulario para agregar un nuevo paciente al sistema</p>
            </div>
        </div>

        <div class="formulario-card">
            <div th:if="${error != null}">
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <span class="error-message" th:text="${error}"></span>
                </div>
            </div>

            <h2>Datos del Paciente</h2>

            <form th:action="@{/paciente/registrar}" method="post">
                <div class="campo">
                    <label>Nombre completo</label>
                    <input type="text" placeholder="Ej: María García López" name="nombres" th:value="${paciente.nombres}" required>
                </div>
                
                <div class="campo">
                    <label>Tipo de Documento</label>
                    <select name="tipoDocumento">
                        <option value="DNI">DNI</option>
                        <option value="CE">Carnet de Extranjería</option>
                        <option value="PASAPORTE">Pasaporte</option>
                    </select>
                </div>

                <div class="campo">
                    <input type="text" name="numeroDocumento" required>
                </div>

                <div class="fila-form">

                    <div>
                        <label>Teléfono</label>
                        <input type="text" placeholder="987 654 321" name="telefono" maxlength="9" pattern="9\d{8}" inputmode="numeric" th:value="${paciente.telefono}" required>
                    </div>

                    <div>
                        <label>Fecha de nacimiento</label>
                        <input type="date" name="fechaNacimiento" th:value="${paciente.fechaNacimiento}" required>
                    </div>
                </div>

                <div class="form-acciones">
                    <a href="/paciente/gestion" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-primario">Registrar Paciente</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
