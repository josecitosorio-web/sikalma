<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo-policlinico.png">
    <title>Registrar Paciente - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>

    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <div class="retorno">
                    <a href="/paciente/gestion">Pacientes</a>
                    <span>›</span>
                    <span>Registrar Paciente</span>
                </div>
                <h1>Registrar Nuevo Paciente</h1>
                <p>Complete el formulario para agregar un nuevo paciente al sistema</p>
            </div>
        </div>

        <div class="formulario-card">
            <div th:if="${error != null}">
                <div style="display: flex; align-items: center; gap: 12px; background-color: #FFFFFF; color: #842029; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; border-left: 5px solid #dc3545; box-shadow: 0 2px 12px rgba(0,0,0,0.06); font-size: 0.95rem;">
                    <span style="color: #dc3545; font-size: 1.1rem; font-weight: bold;">⚠️</span>
                    <span style="font-weight: 500;" th:text="${error}"></span>
                </div>
            </div>

            <h2>Datos del Paciente</h2>

            <form th:action="@{/paciente/registrar}" method="post">
                <div class="campo">
                    <label>Nombre completo</label>
                    <input type="text" placeholder="Ej: María García López" name="nombres" th:value="${paciente.nombres}" required>
                </div>

                <!-- <div class="campo">
                    <label>DNI</label>
                    <input type="text" placeholder="12345678" maxlength="8" name="dni" pattern="\d{8}" inputmode="numeric" th:value="${paciente.dni}" required>
                    <span class="indicacion">Debe contener exactamente 8 dígitos.</span>
                </div> -->

                <div class="campo">
                    <label>Tipo de Documento</label>
                    <select name="tipoDocumento">
                        <option value="DNI">DNI</option>
                        <option value="CE">Carnet de Extranjería</option>
                        <option value="PASAPORTE">Pasaporte</option>
                    </select>
                </div>

                <div class="campo">
                    <input type="text" name="numeroDocumento" required>
                </div>

                <div class="fila-form">

                    <div>
                        <label>Teléfono</label>
                        <input type="text" placeholder="987 654 321" name="telefono" maxlength="9" pattern="9\d{8}" inputmode="numeric" th:value="${paciente.telefono}" required>
                    </div>

                    <div>
                        <label>Fecha de nacimiento</label>
                        <input type="date" name="fechaNacimiento" th:value="${paciente.fechaNacimiento}" required>
                    </div>
                </div>

                <div class="form-acciones">
                    <a href="/paciente/gestion" class="btn-secundario">Cancelar</a>
                    <button type="submit" class="btn-primario">Registrar Paciente</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
