<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - SIKALMA</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div th:replace="fragments/menu :: menu"></div>
    <main>
        <div class="encabezado">
            <div class="encabezado-texto">
                <h1>Gestión de Usuario</h1>
                <p>Visualice y administre la información de los usuarios registrados</p>
            </div>
            <a href="/usuario/nuevo" class="btn-primario">+ Crear nuevo usuario</a>
        </div>

        <div class="buscador-seccion">
            <form th:action="@{/usuario/buscar-usuario}" method="get" class="buscardor-form">
                <input type="text" name="dni" placeholder="Ingrese DNI del doctor..."
                       class="buscador-input" required>
                <button type="submit" class="btn-primario">Buscar por DNI</button>
                <a href="/usuario/gestion" class="btn-secundario buscador-limpiar">Limpiar</a>
            </form>
        </div>

        <div class="tabla-contenedor">
            <table class="tabla-gestion">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Doctor</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${usuarios}">
                        <td th:text="|#U${user.id}|"></td>
                        <td th:text="${user.correo}"></td>
                        <td th:text="${user.rol}"></td>
                        <td th:text="${user.doctor != null ? user.doctor.nombre : 'N/A'}"></td>
                        <td class="acciones-celda">
                                <a th:href="@{/usuario/editar(id=${user.id})}" class="btn-editar">Editar</a>
                            </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
